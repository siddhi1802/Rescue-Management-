name: rescue_app
description: Emergency Rescue App with SOS, Child Help, and Animal Rescue features.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.1
  firebase_auth: ^4.17.9
  cloud_firestore: ^4.15.9
  firebase_messaging: ^14.7.19
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.2
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  firebase_storage: ^11.6.10
  intl: ^0.19.0
  url_launcher: ^6.2.6
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  fluttertoast: ^8.2.4
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  dio: ^5.4.3+1
  flutter_svg: ^2.0.10+1
  badges: ^3.1.2
  timeline_tile: ^2.0.0
  smooth_page_indicator: ^1.1.0
  flutter_spinkit: ^5.2.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true